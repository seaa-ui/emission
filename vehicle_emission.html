<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Vehicle Emissions Calculator</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        h1 { text-align: center; }\n        form { display: flex; flex-direction: column; width: 300px; margin: auto; }\n        input { margin: 5px 0; padding: 10px; }\n        button { padding: 10px; cursor: pointer; }\n    </style>\n</head>\n<body>\n    <h1>Vehicle Emissions Calculator</h1>\n    <form id=\"emissionForm\">\n        <label for=\"vehicleType\">Select Vehicle Type:</label>\n        <select id=\"vehicleType\">\n            <option value=\"motorbike\">Motorbike</option>\n            <option value=\"car\">Car</option>\n            <option value=\"van\">Van</option>\n            <option value=\"hgv\">HGV</option>\n        </select>\n        <label for=\"distance\">Distance (km):</label>\n        <input type=\"number\" id=\"distance\" required>\n        <button type=\"submit\">Calculate Emissions</button>\n    </form>\n    <div id=\"result\"></div>\n    <script>\n        const emissionsData = {\n            motorbike: { emissionFactor: 70 },\n            car: { emissionFactor: 120 },\n            van: { emissionFactor: 180 },\n            hgv: { emissionFactor: 600 }\n        };\n        let emissionHistory = [];\n        document.getElementById(\"emissionForm\").addEventListener(\"submit\", function(event) {\n            event.preventDefault();\n            const vehicleType = document.getElementById(\"vehicleType\").value;\n            const distance = document.getElementById(\"distance\").value;\n            const emissionFactor = emissionsData[vehicleType].emissionFactor;\n            const emissions = (emissionFactor * distance) / 1000;\n            document.getElementById(\"result\").innerText = \`Emissions for ${vehicleType}: ${emissions} kg CO2\`;\n            emissionHistory.push({ vehicleType, distance, emissions });\n        });\n    </script>\n</body>\n</html>
